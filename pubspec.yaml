name: medinear_app
description: "A new Flutter project for Medinear Pharmacy App."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- [ Core & Architecture ] ---
  get_it: ^9.2.0
  provider: ^6.1.5+1

  # --- [ Networking & API ] ---
  dio: ^5.9.1
  #http: ^1.2.1  # 🚀 ضفتلك مكتبة الـ http هنا

  # --- [ Authentication & Firebase ] ---
  firebase_core: ^2.24.2
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.5

  # --- [ Local Storage & Caching ] ---
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- [ Maps & Location ] ---
  # 🚀 رجعنا جوجل مابس الرسمية عشان الديزاين البريميوم بتاعك
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.2

  # --- [ UI & Design Utilities ] ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0

  # --- [ General Utilities ] ---
  intl: ^0.20.2
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  onesignal_flutter: ^5.4.1
  speech_to_text: ^7.3.0
  cached_network_image: ^3.4.1
  flutter_riverpod: 2.5.1
  go_router: ^17.2.2
  flutter_native_splash: ^2.4.7
  google_mlkit_text_recognition: ^0.15.1
  image_cropper: ^12.2.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - lib/core/localization/en.json
    - lib/core/localization/ar.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_launcher_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_launcher_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo_splash.png"
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: "assets/images/logo_splash.png"
    icon_background_color: "#ffffff"
    color: "#ffffff"